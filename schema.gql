  causeRecurringChargesRange(complexId: String!, fromPeriod: String!, toPeriod: String!, applyMora: Boolean = false): RecurringCausationResult!
  registerPackage(input: RegisterPackageInput!): Package!
  markPackageAsNotified(packageId: String!): Package!
  markPackageAsReadyForPickup(packageId: String!): Package!
  confirmPackageDelivery(input: ConfirmDeliveryInput!): Package!
  returnPackage(packageId: String!, reason: String!): Package!
  markPackageAsLost(packageId: String!, reason: String!): Package!
  updateVisitorParkingConfig(input: UpdateVisitorParkingConfigInput!): VisitorParkingConfig!
  setParkingRate(input: SetParkingRateInput!): VisitorParkingConfig!
  toggleParkingRate(rateId: String!): VisitorParkingConfig!
  registerVisitorVehicleEntry(input: RegisterVisitorVehicleInput!): VisitorVehicle!
  registerVisitorVehicleExit(input: ResgiterExitVehicle!): VisitorVehicle!
  cancelVisitorVehicleEntry(visitorVehicleId: String!, cancellationReason: String!): VisitorVehicle!
  deleteNote(id: String!): Note!

  """
  Registra el check-in del supervisor en un complejo residencial. Requiere asignación activa al complejo y validación GPS. Solo puede existir una visita ACTIVA por complejo a la vez.
  """
  supervisorCheckIn(input: SupervisorCheckInInput!): SupervisorVisit!

  """
  Registra el check-out del supervisor. Cierra la visita activa (status: CLOSED).
  """
  supervisorCheckOut(input: SupervisorCheckOutInput!): SupervisorVisit!

  """
  El supervisor solicita acceso a un complejo al que no está asignado. El administrador del complejo recibe la solicitud y puede aprobarla o rechazarla remotamente.
  """
  requestComplexAccess(input: RequestComplexAccessInput!): SupervisorAccessRequest!

  """
  Aprueba la solicitud de acceso de un supervisor. Crea automáticamente la asignación UserComplexAssignment (ACTIVE). El supervisor podrá hacer check-in inmediatamente después.
  """
  approveAccessRequest(requestId: String!): SupervisorAccessRequest!

  """
  Rechaza la solicitud de acceso de un supervisor con un motivo opcional.
  """
  rejectAccessRequest(input: RejectAccessRequestInput!): SupervisorAccessRequest!
