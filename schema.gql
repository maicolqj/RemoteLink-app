  logCall(input: LogCallInput!): CallLog!
  createSpecialNumber(input: CreateSpecialNumberInput!): SpecialNumber!
  updateSpecialNumber(input: UpdateSpecialNumberInput!): SpecialNumber!
  removeSpecialNumber(id: String!): Boolean!
  reorderSpecialNumbers(complexId: String!, ids: [String!]!): [SpecialNumber!]!

  """Reordena los números especiales globales. Solo SUPER_ADMIN."""
  reorderGlobalSpecialNumbers(ids: [String!]!): [SpecialNumber!]!
